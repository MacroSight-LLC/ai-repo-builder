mcpServers:
  # ── Core ─────────────────────────────────────────────────────
  # All servers use stdio transport (npx spawns the process locally).
  # Environment variables are inherited from the parent process.

  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    transport: stdio
    description: GitHub - repos, PRs, issues, branches, commits

  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
    transport: stdio
    description: Context7 - accurate library docs, anti-hallucination

  filesystem:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "./output"]
    transport: stdio
    description: Filesystem - read, write, search files in workspace

  # ── Full-Stack ─────────────────────────────────────────────

  docker:
    command: npx
    args: ["-y", "@docker/mcp-server"]
    transport: stdio
    description: >-
      Docker - build images, run containers, manage compose stacks.
      Use to verify Dockerfiles build correctly during iteration.

  terminal:
    command: python
    args: ["-m", "cuga.terminal_mcp_server"]
    transport: stdio
    description: >-
      Terminal - secure shell execution with allowlisted commands.
      Use for pip install, npm install, pytest, ruff, git, curl, etc.

  brave-search:
    command: npx
    args: ["-y", "@brave/brave-search-mcp-server"]
    transport: stdio
    description: >-
      Web search - research solutions, find examples, look up
      niche library docs not in context7.

  postgres:
    command: npx
    args:
      [
        "-y",
        "@modelcontextprotocol/server-postgres",
        "postgresql://cuga:cuga@localhost:5432/cuga_dev",
      ]
    transport: stdio
    description: >-
      PostgreSQL - create tables, run migrations, verify schema,
      seed data, test queries directly against the dev database.

  memory:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    transport: stdio
    description: >-
      Memory - store and retrieve decisions across agent steps.
      Use to persist architecture choices so later files stay consistent.

  sequential-thinking:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    transport: stdio
    description: >-
      Structured reasoning - break complex problems into steps,
      plan file dependencies, resolve architecture decisions.

  puppeteer:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-puppeteer"]
    transport: stdio
    description: >-
      Headless browser - verify frontend renders, screenshot pages,
      check for console errors, test forms.

  # ── IBM (optional — requires IBM Cloud credentials) ────────
  # These connect to HTTP services you must start via docker compose
  # or use the IBM Cloud-hosted instances.

  code-engine:
    url: http://localhost:8002
    description: >-
      IBM Code Engine - deploy containerized apps to IBM Cloud.
      Requires IBMCLOUD_API_KEY, CODE_ENGINE_PROJECT, CODE_ENGINE_REGION.

  # Uncomment when you have IBM DevOps Toolchain access:
  # devops:
  #   url: http://localhost:8003
  #   description: IBM DevOps - CI/CD pipelines, toolchain management

  # Uncomment when you have QRadar access:
  # qradar:
  #   url: http://localhost:8001
  #   description: IBM QRadar SIEM - security audits, offense queries

  # Uncomment when you have Instana access:
  # instana:
  #   url: http://localhost:8004
  #   description: IBM Instana - APM observability, metrics, alerts
