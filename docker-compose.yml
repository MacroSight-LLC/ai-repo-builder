services:
  # ============================================================
  # CUGA AGENT (core)
  # ============================================================
  cuga:
    build: .
    container_name: cuga
    ports:
      - "7860:7860"
    env_file: .env
    environment:
      - MCP_SERVERS_FILE=/app/mcp_servers.yaml
      - SETTINGS_TOML_PATH=/app/src/cuga/settings.toml
      - PYTHONPATH=/app/src
    volumes:
      - .:/workspace
      - ./mcp_servers.yaml:/app/mcp_servers.yaml
    networks:
      - mcp-net
    restart: unless-stopped

  # ============================================================
  # IBM MCPs
  # ============================================================

  qradar-mcp:
    image: ghcr.io/ibm/qradar-mcp-server:latest
    container_name: qradar-mcp
    ports:
      - "8001:8000"
    environment:
      - QRADAR_HOST=${QRADAR_HOST}
      - QRADAR_API_TOKEN=${QRADAR_API_TOKEN}
      - QRADAR_PORT=${QRADAR_PORT:-443}
    networks:
      - mcp-net
    restart: unless-stopped

  code-engine-mcp:
    image: ghcr.io/greyhoundforty/code-engine-mcp:latest
    container_name: code-engine-mcp
    ports:
      - "8002:8000"
    environment:
      - IBMCLOUD_API_KEY=${IBMCLOUD_API_KEY}
      - CODE_ENGINE_PROJECT=${CODE_ENGINE_PROJECT}
      - CODE_ENGINE_REGION=${CODE_ENGINE_REGION}
    networks:
      - mcp-net
    restart: unless-stopped

  devops-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-mcp
    command: ["python", "-m", "cuga.devops_mcp_server"]
    ports:
      - "8003:8000"
    environment:
      - IBMCLOUD_API_KEY=${IBMCLOUD_API_KEY}
      - IBMCLOUD_REGION=${IBMCLOUD_REGION:-us-south}
    networks:
      - mcp-net
    restart: unless-stopped

  instana-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instana-mcp
    command: ["python", "-m", "cuga.instana_mcp_server"]
    ports:
      - "8004:8000"
    environment:
      - INSTANA_API_TOKEN=${INSTANA_API_TOKEN}
      - INSTANA_BASE_URL=${INSTANA_BASE_URL}
    networks:
      - mcp-net
    restart: unless-stopped

  # ============================================================
  # CODING MCPs
  # ============================================================

  docker-mcp:
    image: alpine/socat
    container_name: docker-mcp
    command: TCP-LISTEN:8000,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock
    ports:
      - "8005:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mcp-net
    restart: unless-stopped

  terminal-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-mcp
    command: ["python", "-m", "cuga.terminal_mcp_server"]
    ports:
      - "8006:8000"
    environment:
      - CUGA_OUTPUT_DIR=/workspace/output
    volumes:
      - .:/workspace
    networks:
      - mcp-net
    restart: unless-stopped

  # ============================================================
  # BACKING SERVICES (databases for generated projects)
  # ============================================================
  # MCP dev-tool servers (github, context7, filesystem, brave-search,
  # postgres, memory, sequential-thinking, puppeteer) run locally
  # via stdio transport (npx). See mcp_servers_local.yaml.
  # ============================================================

  # Dev PostgreSQL — used by generated projects and postgres MCP
  postgres-dev:
    image: postgres:16-alpine
    container_name: postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cuga
      POSTGRES_PASSWORD: cuga
      POSTGRES_DB: cuga_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuga"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mcp-net
    restart: unless-stopped

  # Dev Redis — caching, sessions, queues for generated projects
  redis-dev:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mcp-net
    restart: unless-stopped

  # ============================================================
  # OBSERVABILITY
  # ============================================================
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=${SALT:?Set SALT in .env}
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - mcp-net
    restart: unless-stopped

  langfuse-db:
    image: postgres:15
    container_name: langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    networks:
      - mcp-net
    restart: unless-stopped

networks:
  mcp-net:
    driver: bridge

volumes:
  langfuse-db-data:
  pgdata:
