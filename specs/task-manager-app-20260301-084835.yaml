name: task-manager-app
description: A full-stack task manager application with Next.js frontend and FastAPI backend, featuring user authentication,
  task CRUD operations, and PostgreSQL database integration.
version: 0.1.0
stack:
  language: typescript
  runtime: node20
  frontend:
    framework: nextjs
    styling: tailwind
    state: zustand
  backend:
    framework: fastapi
    api_style: rest
    language: python
    runtime: python3.11
  database:
    primary: postgresql
    orm: sqlalchemy
    cache: redis
  infrastructure:
    containerization: docker
    ci_cd: github-actions
    hosting: docker-compose
structure:
  files:
  - path: frontend/.env.example
    purpose: Example environment variables for frontend
    key_contents:
    - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
  - path: frontend/next.config.js
    purpose: Next.js configuration file
    key_contents:
    - 'module.exports = { reactStrictMode: true, experimental: { appDir: true } };'
  - path: frontend/app/layout.tsx
    purpose: Root layout component for the application
    key_contents:
    - 'export default function RootLayout({ children }: { children: React.ReactNode }) { return (<html><body>{children}</body></html>);
      }'
  - path: frontend/app/page.tsx
    purpose: Home page component
    key_contents:
    - export default function HomePage() { return (<div>Task Manager Dashboard</div>); }
  - path: backend/main.py
    purpose: FastAPI application entry point
    key_contents:
    - 'from fastapi import FastAPI; app = FastAPI(); @app.get(''/'') def read_root(): return {''message'': ''Task Manager
      API''}'
  - path: backend/requirements.txt
    purpose: Python dependencies for backend
    key_contents:
    - fastapi==0.104.1
    - uvicorn==0.23.2
    - sqlalchemy==2.0.23
    - psycopg2==2.9.9
  - path: backend/alembic.ini
    purpose: Alembic configuration for database migrations
    key_contents:
    - '[alembic];sqlalchemy.url = postgresql://user:password@localhost/taskmanager'
  - path: .github/workflows/ci.yaml
    purpose: GitHub Actions CI/CD pipeline configuration
    key_contents:
    - 'name: CI; on: [push]; jobs: test: runs-on: ubuntu-latest; steps: - name: Checkout code; uses: actions/checkout@v3'
  - path: docker-compose.yaml
    purpose: Docker Compose configuration for application services
    key_contents:
    - 'version: ''3''; services: backend: build: ./backend; ports: [''8000:8000'']; depends_on: [db]'
  - path: .gitignore
    purpose: Git ignore file for excluding unnecessary files
    key_contents:
    - node_modules/
    - __pycache__/
    - .env
  - path: README.md
    purpose: Project README file with setup instructions
    key_contents:
    - '# Task Manager App; ## Quickstart; 1. Clone repository; 2. Run ''docker-compose up'''
  - path: frontend/package.json
    purpose: Frontend dependencies and scripts
    key_contents:
    - 'name: task-manager-frontend; scripts: { dev: ''next dev'' }; dependencies: { next: ''14.0.4'' }'
  - path: backend/Dockerfile
    purpose: Dockerfile for building backend image
    key_contents:
    - FROM python:3.11-slim; WORKDIR /app; COPY requirements.txt .; RUN pip install -r requirements.txt
  - path: frontend/Dockerfile
    purpose: Dockerfile for building frontend image
    key_contents:
    - FROM node:20; WORKDIR /app; COPY package*.json ./; RUN npm install
pages:
- path: /
  name: Dashboard
  components:
  - TaskStats
  - TaskList
  data_source: /api/v1/tasks
  auth: authenticated
- path: /tasks
  name: Task List
  components:
  - TaskList
  - TaskFilter
  data_source: /api/v1/tasks
  auth: authenticated
- path: /tasks/[id]
  name: Task Detail
  components:
  - TaskDetail
  data_source: /api/v1/tasks/{id}
  auth: authenticated
- path: /login
  name: Login
  components:
  - LoginForm
  data_source: /api/v1/auth/login
  auth: public
components:
- name: TaskList
  type: table
  props:
  - name: tasks
    type: Task[]
    required: true
  state:
  - selectedTasks
  children:
  - TaskRow
- name: TaskDetail
  type: widget
  props:
  - name: taskId
    type: string
    required: true
  state: []
  children: []
- name: LoginForm
  type: form
  props: []
  state:
  - username
  - password
  children:
  - TextInput
  - PasswordInput
  - SubmitButton
features:
- name: User Authentication
  type: auth
  details:
    endpoints:
    - POST /api/v1/auth/login - Authenticate user
    - POST /api/v1/auth/refresh - Refresh JWT token
    business_logic:
    - Validate user credentials
    - Generate JWT token upon successful authentication
    validations:
    - Validate username and password format
- name: Task CRUD
  type: crud
  details:
    endpoints:
    - GET /api/v1/tasks - List tasks
    - POST /api/v1/tasks - Create task
    - GET /api/v1/tasks/{id} - Get task by ID
    - PUT /api/v1/tasks/{id} - Update task
    - DELETE /api/v1/tasks/{id} - Delete task
    business_logic:
    - Validate task data
    - Store task in database
    validations:
    - Validate task title and description
    - Check task priority and category validity
data_model:
  entities:
  - name: Task
    fields:
    - name: id
      type: integer
      constraints:
      - primary_key
    - name: title
      type: string
      constraints:
      - not_null
    - name: description
      type: text
    - name: priority
      type: string
      constraints:
      - not_null
    - name: category
      type: string
    - name: user_id
      type: integer
      constraints:
      - foreign_key(User.id)
    relationships:
    - type: many_to_one
      target: User
      foreign_key: user_id
  - name: User
    fields:
    - name: id
      type: integer
      constraints:
      - primary_key
    - name: username
      type: string
      constraints:
      - unique
      - not_null
    - name: password
      type: string
      constraints:
      - not_null
  migrations:
    tool: alembic
api:
  base_path: /api/v1
  auth_required: true
  rate_limiting: 100/minute
  response_format:
    envelope: true
    shape: '{"data": $data, "error": $error}'
testing:
  framework: pytest
  coverage_target: 80
  fixtures:
  - users
  - tasks
  patterns:
  - Unit tests for individual components
  - Integration tests for API endpoints
deployment:
  docker:
    multi_stage: true
    base_image: python:3.11-slim
    compose_services:
    - name: backend
      image: task-manager-backend
      ports:
      - 8000:8000
    - name: frontend
      image: task-manager-frontend
      ports:
      - 3000:3000
    - name: db
      image: postgres:16
      ports:
      - 5432:5432
  ci_cd:
    provider: github-actions
    pipeline:
    - Lint code
    - Run tests
    - Build Docker images
    - Push images to registry
standards:
  formatting: prettier
  linting: eslint
  typing: tsc
  docstrings: jsdoc
  git:
    commit_convention: conventional
security:
  authentication: required
  authorization: rbac
  input_validation: strict
  secrets: environment_variables_only
  cors_origins:
  - http://localhost:3000
  dependency_scanning: github-dependabot
